name: custom:com.dynatrace.extension.kong-auditlog
version: 1.0.5
minDynatraceVersion: 1.333.0

author:
  name: Dynatrace

keywords:
  - Kong Audit Logs
  - kong
  - konnect
  - audit-logs
  - security
  - compliance

# OpenPipeline configurations
openpipeline:
  sources:
    - displayName: Kong Audit Log Sources
      sourcePath: openpipeline/logs.source.json
      configScope: logs
  pipelines:
    - displayName: Kong Audit Log Pipeline
      pipelinePath: openpipeline/logs.pipeline.json
      configScope: logs

# Dashboards
documents:
  dashboards:
  - displayName: Kong Audit Logs
    path: documents/overview.dashboard.json